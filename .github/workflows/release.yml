name: Build Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '23'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build Windows
        run: wails build -trimpath

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Windows archive
        run: |
          cd build/bin
          7z a -tzip api-key-manager-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip api-key-manager.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/api-key-manager-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build Linux
        run: wails build -trimpath -tags webkit2_41

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Linux archive
        run: |
          cd build/bin
          tar -czvf api-key-manager-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz api-key-manager

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/api-key-manager-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: API Key Manager ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## API Key Manager ${{ steps.get_version.outputs.VERSION }}

            ### 下载说明
            - **Windows**: 下载 `api-key-manager-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip`
            - **Linux**: 下载 `api-key-manager-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz`

            ### 安装方式
            - **Windows**: 解压后直接运行 `api-key-manager.exe`
            - **Linux**: 解压后赋予执行权限 `chmod +x api-key-manager`，然后运行

            ---
            如有问题请在 [Issues](../../issues) 中反馈。
          files: |
            artifacts/api-key-manager-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip
            artifacts/api-key-manager-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz
          draft: false
          prerelease: false